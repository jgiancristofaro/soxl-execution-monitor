name: Preview Run (3:50pm ET)
on:
  schedule:
    - cron: '0 18 * * 1-5'   # EDT: fires ~110min before 19:50 UTC target
    - cron: '0 19 * * 1-5'   # EST: fires ~110min before 20:50 UTC target
  workflow_dispatch:
permissions: { contents: write, actions: write }
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip, cache-dependency-path: pipeline/requirements.txt }
      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Sleep until 15:50 ET
        run: python scripts/wait_until.py --et 15:50
      - name: Run preview pipeline
        run: python pipeline/preview.py
      - name: Commit preview snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/preview.json site/public/data/preview.json
          git diff --staged --quiet || git commit -m "chore: preview snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase --autostash origin main
          git push
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'deploy.yml', ref: 'main',
            });
