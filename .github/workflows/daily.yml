name: Daily Data Update
on:
  schedule:
    - cron: '0 20 * * 1-5'   # EDT: fires ~90min before 21:30 UTC target
    - cron: '0 21 * * 1-5'   # EST: fires ~90min before 22:30 UTC target
  workflow_dispatch:
permissions: { contents: write, issues: write, actions: write }
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip, cache-dependency-path: pipeline/requirements.txt }
      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Sleep until 17:30 ET
        run: python scripts/wait_until.py --et 17:30
      - name: Run pipeline
        run: python pipeline/compute.py
      - name: Copy data for site build
        run: |
          mkdir -p site/public/data
          cp data/signals.json site/public/data/signals.json
          if [ -f data/preview.json ]; then cp data/preview.json site/public/data/preview.json; fi
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/public/data/
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'deploy.yml', ref: 'main',
            });
      - name: Open alert issues
        if: always()
        uses: actions/github-script@v7
        env: { SIGNALS_PATH: data/signals.json }
        with:
          script: |
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync(process.env.SIGNALS_PATH, 'utf8'));
            for (const a of (d.alerts || [])) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `⚡ ${a.title} (${d.last_session})`,
                body: `${a.body}\n\nDashboard: https://jgiancristofaro.github.io/soxl-execution-monitor/`,
                labels: ['execution-alert'],
              });
            }
